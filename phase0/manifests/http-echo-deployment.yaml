apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-echo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-echo
  template:
    metadata:
      labels:
        app: http-echo
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args: ["-text=Cavendish Phase 0 — routed from inside the cluster"]
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: http-echo
  namespace: default
spec:
  selector:
    app: http-echo
  ports:
    - port: 80
      targetPort: 5678
