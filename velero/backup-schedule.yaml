# Daily Velero schedule — Kubernetes objects for cavendish-staging.
# Production namespace is omitted until that environment exists.
# PVC/DB data is restored separately from pg_dump in S3 (see docs/dr-runbook.md).
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: cavendish-daily
  namespace: velero
  labels:
    app.kubernetes.io/part-of: cavendish
spec:
  schedule: "0 2 * * *"  # Daily at 02:00 UTC
  template:
    includedNamespaces:
      - cavendish-staging
    # Uncomment when production exists:
    # - cavendish-production
    storageLocation: default
    ttl: 720h  # 30 days retention
    snapshotVolumes: false
    defaultVolumesToFsBackup: false
    includedResources:
      - "*"
    excludedResources:
      - events
      - events.events.k8s.io
