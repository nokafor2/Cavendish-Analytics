# Negative test for Pod Security Standards (restricted).
# Applying this into cavendish-staging MUST be rejected by the PSS admission
# controller — it requests privileged + host namespaces + runs as root.
# If this Pod is admitted, the namespace is NOT enforcing "restricted".
apiVersion: v1
kind: Pod
metadata:
  name: pss-violation-test
  namespace: cavendish-staging
  labels:
    app.kubernetes.io/part-of: cavendish
    test: pss-negative
spec:
  hostNetwork: true
  hostPID: true
  containers:
    - name: bad
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      securityContext:
        privileged: true
        runAsUser: 0
        allowPrivilegeEscalation: true
