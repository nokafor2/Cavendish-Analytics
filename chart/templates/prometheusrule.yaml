{{- if .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cavendish-alerts
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: cavendish
    release: kube-prometheus-stack
spec:
  groups:
    - name: cavendish.api
      rules:
        - alert: AnalyticsAPIHighErrorRate
          expr: |
            (
              sum(rate(http_request_errors_total{namespace="{{ .Values.namespace.name }}"}[5m]))
              /
              sum(rate(http_requests_total{namespace="{{ .Values.namespace.name }}"}[5m]))
            ) > {{ .Values.monitoring.prometheusRule.apiErrorRateThreshold }}
          for: 5m
          labels:
            severity: critical
            environment: {{ .Values.global.environment }}
          annotations:
            summary: "Analytics API error rate above threshold"
            description: "Error rate is {{`{{ $value | humanizePercentage }}`}} in {{ .Values.namespace.name }}"
    - name: cavendish.database
      rules:
        - alert: PostgreSQLConnectionSaturation
          expr: |
            pg_stat_activity_count{namespace="{{ .Values.namespace.name }}"}
            > {{ .Values.monitoring.prometheusRule.dbConnectionThreshold }}
          for: 5m
          labels:
            severity: warning
            environment: {{ .Values.global.environment }}
          annotations:
            summary: "PostgreSQL active connections near limit"
            description: "{{`{{ $value }}`}} active connections in {{ .Values.namespace.name }}"
{{- end }}
