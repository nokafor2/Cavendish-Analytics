{{- if .Values.networkPolicy.enabled }}
---
# Default deny all ingress and egress for every Pod in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: cavendish
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ALB (target-type: ip) sends traffic from VPC ENIs — not from kube-system Pods.
# Allow inbound HTTP from the VPC CIDR to API / dashboard ports only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alb-ingress
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: cavendish
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - analytics-api
          - dashboard
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.vpcCidr | quote }}
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8080
---
# ALB health checks and client responses require egress back into the VPC.
# Ingress-only rules are not enough — pods must be able to SEND replies to the ALB.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-vpc
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: cavendish
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - analytics-api
          - dashboard
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.vpcCidr | quote }}
---
# Allow webhook-processor → analytics-api (D7 positive-path test).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-to-api
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: cavendish
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: analytics-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: webhook-processor
      ports:
        - protocol: TCP
          port: 8000
---
# Egress from webhook-processor → analytics-api (pairs with allow-webhook-to-api ingress).
# Without this, default-deny blocks outbound traffic from the webhook Pod even when
# ingress on analytics-api would allow the response.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-egress-to-api
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: cavendish
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: webhook-processor
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: analytics-api
      ports:
        - protocol: TCP
          port: 8000
---
# Allow analytics-api + webhook-processor → postgres on 5432 only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-postgres
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: cavendish
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: analytics-api
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: webhook-processor
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pg-backup
      ports:
        - protocol: TCP
          port: 5432
---
# Egress to postgres for workloads that query the database or run pg_dump.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-postgres
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: cavendish
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - analytics-api
          - webhook-processor
          - pg-backup
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
---
# pg-backup CronJob uploads dumps to S3 over HTTPS (via NAT gateway).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backup-egress-https
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: cavendish
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pg-backup
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
---
# DNS egress for all Pods (kube-dns / CoreDNS in kube-system).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: cavendish
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
