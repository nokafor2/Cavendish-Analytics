{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.secrets.enabled }}
---
# Pulls the PostgreSQL credentials from AWS Secrets Manager via the Secrets Store
# CSI Driver + AWS provider, and syncs them into a Kubernetes Secret that the
# Deployment consumes with envFrom. The Pod authenticates with its IRSA role —
# no static AWS keys, no DB password in Git.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ $svc.secrets.secretProviderClass }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: cavendish
spec:
  provider: aws
  parameters:
    region: {{ $.Values.global.awsRegion }}
    objects: |
      - objectName: "{{ $.Values.global.secretsManagerName }}"
        objectType: "secretsmanager"
        jmesPath:
          - path: username
            objectAlias: DB_USERNAME
          - path: password
            objectAlias: DB_PASSWORD
  secretObjects:
    - secretName: {{ $name }}-db-credentials
      type: Opaque
      data:
        - objectName: DB_USERNAME
          key: DB_USERNAME
        - objectName: DB_PASSWORD
          key: DB_PASSWORD
    - secretName: postgres-credentials
      type: Opaque
      data:
        - objectName: DB_USERNAME
          key: username
        - objectName: DB_PASSWORD
          key: password
{{- end }}
{{- end }}
