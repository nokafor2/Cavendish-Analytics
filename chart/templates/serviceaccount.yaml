{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: cavendish
  {{- if $svc.irsa.enabled }}
  annotations:
    eks.amazonaws.com/role-arn: {{ $svc.irsa.roleArn | quote }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
{{- end }}
---
{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: cavendish
  # No IRSA annotation — the postgres pod needs no AWS access (least privilege).
  # Only pg-backup assumes the backup role to write dumps to S3.
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pg-backup
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: pg-backup
    app.kubernetes.io/part-of: cavendish
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.postgresql.backup.irsaRoleArn | quote }}
