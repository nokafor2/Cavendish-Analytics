{{- if and .Values.postgresql.enabled .Values.postgresql.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-dump-backup
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: pg-backup
    app.kubernetes.io/part-of: cavendish
spec:
  schedule: {{ .Values.postgresql.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: pg-backup
            app.kubernetes.io/part-of: cavendish
        spec:
          serviceAccountName: pg-backup
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -ec
                - |
                  apk add --no-cache aws-cli
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  pg_dump -h postgres -U "$PGUSER" -d {{ .Values.postgresql.database }} \
                    | gzip > "/tmp/backup_${TIMESTAMP}.sql.gz"
                  aws s3 cp "/tmp/backup_${TIMESTAMP}.sql.gz" \
                    "s3://{{ .Values.postgresql.backup.s3Bucket }}/pg-dump/${TIMESTAMP}.sql.gz"
              env:
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: password
                - name: AWS_DEFAULT_REGION
                  value: {{ .Values.global.awsRegion }}
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
{{- end }}
