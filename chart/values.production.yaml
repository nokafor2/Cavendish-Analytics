global:
  environment: production
  domain: cavendish.example.com
  secretsManagerName: cavendish/production/postgres

namespace:
  name: cavendish-production

# Map keys deep-merge onto base values.yaml — only override what differs.
services:
  analytics-api:
    replicas: 2
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    irsa:
      enabled: true
      roleArn: ""  # terraform output -raw irsa_analytics_api_role_arn
  dashboard:
    replicas: 2
  webhook-processor:
    replicas: 2

postgresql:
  storageSize: 50Gi
  backup:
    s3Bucket: ""        # terraform output -raw pg_backups_bucket
    irsaRoleArn: ""     # terraform output -raw irsa_postgres_backup_role_arn

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70

monitoring:
  prometheusRule:
    enabled: true
    apiErrorRateThreshold: 0.05
    dbConnectionThreshold: 80
