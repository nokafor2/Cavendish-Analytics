# Base defaults — overridden by values.staging.yaml / values.production.yaml.
# services is a MAP keyed by service name so env overlays deep-merge per service
# (Helm replaces lists but merges maps). roleArn / image are injected per env.

global:
  environment: staging
  domain: cavendish.example.com
  acmCertificateArn: ""           # terraform output -raw acm_certificate_arn
  awsRegion: eu-west-2
  imageRegistry: ""               # ECR registry, e.g. <acct>.dkr.ecr.eu-west-2.amazonaws.com/cavendish
  secretsManagerName: cavendish/staging/postgres  # Secrets Manager secret consumed by the CSI driver

namespace:
  name: cavendish-staging
  podSecurity:
    enforce: restricted
    audit: restricted
    warn: restricted

# All deployable services — iterated by range loop in templates (range $name, $svc)
services:
  analytics-api:
    enabled: true
    component: api
    image:
      repository: analytics-api
      tag: latest
      pullPolicy: IfNotPresent
    replicas: 2
    port: 8000
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    irsa:
      enabled: true
      roleArn: ""                 # terraform output -raw irsa_analytics_api_role_arn
    secrets:
      enabled: true
      secretProviderClass: cavendish-db-secrets
    ingress:
      enabled: true
      host: api
      path: /
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s

  # Placeholder service — no image built yet. Enable once dashboard/ exists in ECR.
  dashboard:
    enabled: false
    component: frontend
    image:
      repository: dashboard
      tag: latest
      pullPolicy: IfNotPresent
    replicas: 1
    port: 3000
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    irsa:
      enabled: false
      roleArn: ""
    secrets:
      enabled: false
      secretProviderClass: ""
    ingress:
      enabled: true
      host: dashboard
      path: /
    serviceMonitor:
      enabled: false
      path: /metrics
      interval: 30s

  # Placeholder service — no image built yet. Enable once webhook-processor/ exists in ECR.
  webhook-processor:
    enabled: false
    component: worker
    image:
      repository: webhook-processor
      tag: latest
      pullPolicy: IfNotPresent
    replicas: 1
    port: 8080
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    irsa:
      enabled: false
      roleArn: ""
    secrets:
      enabled: false
      secretProviderClass: ""
    ingress:
      enabled: false
      host: webhook
      path: /
    serviceMonitor:
      enabled: true
      path: /metrics
      interval: 30s

postgresql:
  enabled: true
  image: postgres:16-alpine
  storageClass: gp3
  storageSize: 20Gi
  database: cavendish
  exporter:
    enabled: true
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
  backup:
    enabled: true
    schedule: "0 */6 * * *"  # Every 6 hours
    s3Bucket: ""             # terraform output -raw pg_backups_bucket
    irsaRoleArn: ""          # terraform output -raw irsa_postgres_backup_role_arn

hpa:
  enabled: false
  targetService: analytics-api
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70

networkPolicy:
  enabled: true
  vpcCidr: "10.0.0.0/16"   # VPC where ALB ENIs live (terraform var vpc_cidr)

monitoring:
  serviceMonitors:
    enabled: false   # Enable in Week 2 after kube-prometheus-stack installs the CRD
  prometheusRule:
    enabled: false
    apiErrorRateThreshold: 0.05
    dbConnectionThreshold: 80

ingress:
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    external-dns.alpha.kubernetes.io/ttl: "300"
