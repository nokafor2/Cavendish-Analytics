apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cavendish-environments
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: staging
            namespace: cavendish-staging
            valuesFile: values.staging.yaml
            syncWave: "1"
          # Production is enabled once its infrastructure exists (separate
          # Terraform workspace / cluster: IRSA roles, ECR images, Secrets
          # Manager secret, backups bucket). Uncomment when ready.
          # - env: production
          #   namespace: cavendish-production
          #   valuesFile: values.production.yaml
          #   syncWave: "2"
  template:
    metadata:
      name: "cavendish-{{env}}"
      labels:
        app.kubernetes.io/part-of: cavendish
        environment: "{{env}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/nokafor2/Cavendish-Analytics.git
        targetRevision: main
        path: chart
        helm:
          valueFiles:
            - values.yaml
            - "{{valuesFile}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      ignoreDifferences:
        - group: autoscaling
          kind: HorizontalPodAutoscaler
          jsonPointers:
            - /spec/replicas
