name: CD (GitOps promote)

# GitOps deploy: CI builds + pushes the image to ECR, this workflow pins the new
# image tag into the env value file and commits it. ArgoCD (automated sync) then
# reconciles the cluster. No AWS auth or helm here — ArgoCD owns the deploy.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Image tag to deploy (defaults to the triggering commit SHA)
        required: false
        type: string

permissions:
  contents: write   # push the tag-bump commit back to main

jobs:
  promote:
    name: Bump image tag in Git
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Resolve target environment + image tag
        id: vars
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.workflow_run.head_sha || github.sha }}"
          fi
          echo "env=$ENV" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Pin image tag in values.${{ steps.vars.outputs.env }}.yaml
        run: |
          ENV="${{ steps.vars.outputs.env }}"
          TAG="${{ steps.vars.outputs.tag }}"
          yq -i '."services"."analytics-api"."image"."tag" = strenv(TAG)' "chart/values.${ENV}.yaml"
          echo "----- chart/values.${ENV}.yaml -----"
          cat "chart/values.${ENV}.yaml"
        env:
          TAG: ${{ steps.vars.outputs.tag }}

      - name: Commit + push (ArgoCD syncs the change)
        run: |
          ENV="${{ steps.vars.outputs.env }}"
          TAG="${{ steps.vars.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- "chart/values.${ENV}.yaml"; then
            echo "No tag change for ${ENV} (already at ${TAG}); nothing to promote."
            exit 0
          fi
          git add "chart/values.${ENV}.yaml"
          git commit -m "chore(deploy): ${ENV} analytics-api -> ${TAG} [skip ci]"
          git push origin main
